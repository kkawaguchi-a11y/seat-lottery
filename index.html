<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席次くじ引き</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0d0d0f; --panel: #16161a; --border: #2a2a35;
    --gold: #e8c87a; --gold2: #c9993a; --red: #c94040;
    --white: #f0ece0; --muted: #7a7870;
    --done-bg: #1a2a1a; --done-border: #3a5a3a; --done-text: #6aaa6a;
    --fixed-bg: #1a1a2e; --fixed-border: #3a3a6a; --fixed-text: #8888cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Noto Serif JP', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 28px 16px 56px; background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(232,200,122,0.07) 0%, transparent 70%), repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 40px); }
  header { text-align: center; margin-bottom: 28px; }
  .title-en { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:6px; color:var(--gold2); text-transform:uppercase; margin-bottom:8px; }
  h1 { font-size:clamp(24px,5.5vw,42px); font-weight:900; letter-spacing:0.18em; color:var(--gold); text-shadow:0 0 40px rgba(232,200,122,0.3); }
  h1::before, h1::after { content:'―'; color:var(--gold2); font-size:0.5em; vertical-align:middle; margin:0 10px; }
  .subtitle { font-size:11px; color:var(--muted); margin-top:8px; letter-spacing:2px; }
  .day-badge { display:inline-block; margin-top:10px; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; padding:4px 12px; border-radius:20px; border:1px solid var(--border); color:var(--muted); }
  .day-badge.friday { border-color:var(--gold2); color:var(--gold); background:rgba(232,200,122,0.08); }
  .sync-bar { display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); margin-top:8px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background 0.4s; }
  .sync-dot.online { background:#6aaa6a; box-shadow:0 0 6px #6aaa6a; }
  .sync-dot.offline { background:var(--red); }
  .wrap { width:100%; max-width:860px; display:flex; flex-direction:column; gap:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:2px; padding:20px 20px 22px; position:relative; }
  .panel::before { content:''; position:absolute; top:4px; left:4px; right:4px; bottom:4px; border:1px solid rgba(232,200,122,0.06); pointer-events:none; }
  .panel-title { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:4px; color:var(--gold2); text-transform:uppercase; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .step-header { display:flex; align-items:center; font-size:13px; letter-spacing:2px; color:var(--white); margin-bottom:14px; }
  .step-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--gold2); color:#0d0d0f; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; margin-right:8px; flex-shrink:0; }
  .member-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
  .member-chip { padding:10px 6px; background:#1c1c22; border:1px solid var(--border); border-radius:2px; text-align:center; cursor:pointer; transition:all 0.18s; user-select:none; }
  .member-chip:hover:not(.done):not(.me):not(.fixed) { border-color:var(--gold2); background:#242430; }
  .member-chip.me { background:rgba(232,200,122,0.12); border-color:var(--gold); box-shadow:0 0 14px rgba(232,200,122,0.25); }
  .member-chip.done { background:var(--done-bg); border-color:var(--done-border); cursor:default; }
  .member-chip.fixed { background:var(--fixed-bg); border-color:var(--fixed-border); cursor:default; }
  .chip-name { font-size:14px; font-weight:700; color:var(--white); }
  .member-chip.me .chip-name { color:var(--gold); }
  .member-chip.done .chip-name { color:var(--done-text); font-size:12px; }
  .member-chip.fixed .chip-name { color:var(--fixed-text); }
  .chip-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:3px; }
  .member-chip.done .chip-sub { color:var(--done-text); }
  .member-chip.me .chip-sub { color:var(--gold2); }
  .member-chip.fixed .chip-sub { color:var(--fixed-text); opacity:0.8; }
  .unlock-btn { display:inline-block; margin-top:5px; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px; padding:3px 8px; border-radius:2px; cursor:pointer; background:transparent; border:1px solid var(--fixed-border); color:var(--fixed-text); transition:all 0.18s; }
  .unlock-btn:hover { background:rgba(136,136,204,0.15); border-color:#8888cc; color:#aaaaee; }
  .draw-stage { display:flex; flex-direction:column; align-items:center; gap:18px; }
  .who-draws { font-size:13px; letter-spacing:2px; color:var(--muted); text-align:center; }
  .who-draws strong { color:var(--gold); font-size:18px; letter-spacing:3px; }
  .slot-box { display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center; }
  .slot { background:#141418; border:2px solid var(--border); border-radius:2px; width:120px; height:76px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:border-color 0.3s; }
  .slot.active { border-color:var(--gold); background:#1c1c14; }
  .slot-label { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:var(--muted); margin-bottom:4px; }
  .slot-val { font-size:22px; font-weight:900; color:var(--white); letter-spacing:1px; min-height:30px; display:flex; align-items:center; }
  .slot.active .slot-val { color:var(--gold); text-shadow:0 0 20px rgba(232,200,122,0.6); }
  @keyframes spin
